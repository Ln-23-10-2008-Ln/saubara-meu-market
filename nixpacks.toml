[phases.setup]
nixPkgs = ["nodejs_22", "curl", "unzip"]

[phases.install]
cmds = [
  "curl -fsSL https://bun.sh/install | bash",
  "export BUN_INSTALL=\"$HOME/.bun\" && export PATH=\"$BUN_INSTALL/bin:$PATH\" && bun install --frozen-lockfile"
]

[phases.build]
cmds = []

[start]
cmd = "export BUN_INSTALL=\"$HOME/.bun\" && export PATH=\"$BUN_INSTALL/bin:$PATH\" && bun run packages/server/src/server.ts"
